name: Build Electron App

on:
  workflow_dispatch:
  push:
    tags:
      - v*

concurrency:
  group: build-electron-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run build:electron:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          if-no-files-found: error
          path: |
            frontend/release/DomX-CRM-Setup-*-x64.exe
            frontend/release/DomX-CRM-Setup-*-x64.exe.blockmap
            frontend/release/latest.yml
          retention-days: 30

  build-mac:
    name: Build macOS
    runs-on: macos-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build macOS installers
        run: npm run build:electron:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-release
          if-no-files-found: error
          path: |
            frontend/release/DomX-CRM-*-arm64.dmg
            frontend/release/DomX-CRM-*-x64.dmg
            frontend/release/DomX-CRM-*-arm64-mac.zip
            frontend/release/DomX-CRM-*-x64-mac.zip
            frontend/release/latest-mac.yml
          retention-days: 30

  merge-release:
    name: Merge release artifacts
    needs:
      - build-windows
      - build-mac
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: artifacts/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-release
          path: artifacts/mac

      - name: Merge artifacts
        run: |
          mkdir -p frontend/release
          cp -v artifacts/windows/* frontend/release/
          cp -v artifacts/mac/* frontend/release/
          ls -la frontend/release/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate combined latest.json
        working-directory: frontend
        run: node scripts/generate-update-manifest.js

      - name: Upload combined release
        uses: actions/upload-artifact@v4
        with:
          name: domx-crm-release
          if-no-files-found: error
          path: frontend/release/
          retention-days: 90

  publish-github-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - merge-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download combined release
        uses: actions/download-artifact@v4
        with:
          name: domx-crm-release
          path: release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
