<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | DomX</title>
    
    <!-- Tailwind CSS for rapid styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Config for custom colors and fonts (JetBrains/Notion vibe) -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6', // Atlassian-ish Blue
                            600: '#2563eb',
                            900: '#1e3a8a',
                        },
                        darkbase: {
                            900: '#09090b', // Deep JetBrains-like dark
                            800: '#18181b', // Card dark
                            700: '#27272a', // Border dark
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Theme Initialization Script (Prevents FOUC) -->
    <script>
        // Check for saved user preference, if any, on load of the website
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    
    <style>
        /* Custom scrollbar and selection colors for that premium feel */
        ::selection {
            background-color: #3b82f6;
            color: white;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
        .glass-panel {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="bg-[#F7F8FA] dark:bg-darkbase-900 text-gray-900 dark:text-gray-100 min-h-screen flex flex-col transition-colors duration-300 antialiased selection:bg-brand-500 selection:text-white">

    <!-- Theme Toggle Button -->
    <div class="absolute top-6 right-6">
        <button id="theme-toggle" type="button" class="text-gray-500 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-darkbase-700 focus:outline-none focus:ring-2 focus:ring-brand-500 rounded-lg text-sm p-2.5 transition-colors duration-200">
            <i data-lucide="sun" id="theme-toggle-light-icon" class="hidden w-5 h-5"></i>
            <i data-lucide="moon" id="theme-toggle-dark-icon" class="hidden w-5 h-5"></i>
        </button>
    </div>

    <!-- Main Content Centered -->
    <main class="flex-grow flex items-center justify-center p-4">
        
        <!-- Login Card -->
        <div class="w-full max-w-[420px] bg-white dark:bg-darkbase-800 rounded-xl shadow-[0_2px_10px_rgba(0,0,0,0.04)] dark:shadow-[0_2px_15px_rgba(0,0,0,0.3)] border border-gray-200/60 dark:border-darkbase-700 overflow-hidden transform transition-all">
            
            <div class="p-8 sm:p-10">
                <!-- Logo / Header -->
                <div class="mb-8 text-center flex flex-col items-center">
                    <div class="w-12 h-12 bg-gray-900 dark:bg-white rounded-lg flex items-center justify-center mb-5 shadow-sm">
                        <span class="text-white dark:text-black font-bold text-xl tracking-tighter">DX</span>
                    </div>
                    <h1 class="text-2xl font-semibold tracking-tight text-gray-900 dark:text-white">
                        Log in to Dom<span class="text-brand-500">X</span>
                    </h1>
                    <p class="text-sm text-gray-500 dark:text-gray-400 mt-2">
                        Welcome back to your dashboard
                    </p>
                </div>

                <!-- Login Form -->
                <form action="#" method="POST" class="space-y-5" onsubmit="event.preventDefault(); handleLogin();">
                    
                    <!-- Email Input -->
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Work Email</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                                <i data-lucide="mail" class="w-4 h-4"></i>
                            </div>
                            <input type="email" name="email" id="email" class="bg-gray-50 dark:bg-darkbase-900 border border-gray-300 dark:border-darkbase-700 text-gray-900 dark:text-white text-sm rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 block w-full pl-10 p-2.5 transition-all duration-200 outline-none" placeholder="name@company.com" required>
                        </div>
                    </div>

                    <!-- Password Input -->
                    <div>
                        <div class="flex items-center justify-between mb-1.5">
                            <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Password</label>
                            <a href="#" class="text-xs font-medium text-brand-600 hover:text-brand-500 dark:text-brand-400 dark:hover:text-brand-300 transition-colors">Forgot password?</a>
                        </div>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                                <i data-lucide="lock" class="w-4 h-4"></i>
                            </div>
                            <input type="password" name="password" id="password" placeholder="••••••••" class="bg-gray-50 dark:bg-darkbase-900 border border-gray-300 dark:border-darkbase-700 text-gray-900 dark:text-white text-sm rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 block w-full pl-10 p-2.5 transition-all duration-200 outline-none" required>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="w-full text-white bg-brand-600 hover:bg-brand-500 focus:ring-4 focus:outline-none focus:ring-brand-500/50 font-medium rounded-lg text-sm px-5 py-2.5 text-center transition-all duration-200 shadow-sm mt-6 flex justify-center items-center gap-2">
                        <span>Sign In</span>
                        <i data-lucide="arrow-right" class="w-4 h-4 opacity-70 group-hover:opacity-100 group-hover:translate-x-1 transition-all"></i>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <!-- Footer / Version -->
    <footer class="py-6 text-center text-xs text-gray-400 dark:text-gray-500 font-mono tracking-tight">
        DomX Dashboard &copy; 2026 • v2.14.9
    </footer>

    <!-- Interactive Scripts -->
    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Theme Toggle Logic
        const themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
        const themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');

        // Change the icons inside the button based on previous settings
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            themeToggleLightIcon.classList.remove('hidden');
        } else {
            themeToggleDarkIcon.classList.remove('hidden');
        }

        const themeToggleBtn = document.getElementById('theme-toggle');

        themeToggleBtn.addEventListener('click', function() {
            // toggle icons inside button
            themeToggleDarkIcon.classList.toggle('hidden');
            themeToggleLightIcon.classList.toggle('hidden');

            // if set via local storage previously
            if (localStorage.getItem('color-theme')) {
                if (localStorage.getItem('color-theme') === 'light') {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('color-theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('color-theme', 'light');
                }
            // if NOT set via local storage previously
            } else {
                if (document.documentElement.classList.contains('dark')) {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('color-theme', 'light');
                } else {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('color-theme', 'dark');
                }
            }
        });

        // Mock login handling
        function handleLogin() {
            const btn = document.querySelector('button[type="submit"]');
            const originalHtml = btn.innerHTML;
            
            // Loading state
            btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> <span>Authenticating...</span>`;
            lucide.createIcons();
            
            // Simulate network request
            setTimeout(() => {
                btn.innerHTML = `<i data-lucide="check" class="w-4 h-4"></i> <span>Success</span>`;
                btn.classList.replace('bg-brand-600', 'bg-green-600');
                btn.classList.replace('hover:bg-brand-500', 'hover:bg-green-500');
                btn.classList.replace('focus:ring-brand-500/50', 'focus:ring-green-500/50');
                lucide.createIcons();
                
                // Reset after simulation (normally you would redirect here)
                setTimeout(() => {
                    btn.innerHTML = originalHtml;
                    btn.classList.replace('bg-green-600', 'bg-brand-600');
                    btn.classList.replace('hover:bg-green-500', 'hover:bg-brand-500');
                    btn.classList.replace('focus:ring-green-500/50', 'focus:ring-brand-500/50');
                    document.getElementById('password').value = '';
                }, 1500);
            }, 1000);
        }
    </script>
</body>
</html>
